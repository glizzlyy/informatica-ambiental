<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg-dark:#020617;
  --text-main:#ffffff;
  --text-muted:#94a3b8;
  --primary:#38bdf8;
  --glass:rgba(255,255,255,0.03);
  --glass-border:rgba(255,255,255,0.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top left,#1e293b,#020617 50%);
  color:var(--text-main);
  min-height:100vh;
  display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:280px;
  min-width:280px;
  height:100vh;
  position:fixed;
  top:0;
  left:0;
  background:rgba(2,6,23,0.9);
  backdrop-filter:blur(15px);
  border-right:1px solid var(--glass-border);
  padding:40px 20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.sidebar h2{
  font-size:12px;
  letter-spacing:3px;
  color:white;
  text-align:center;
  margin-bottom:30px;
}

.sidebar a{
  font-size:14px;
  color:var(--text-muted);
  text-decoration:none;
  padding:12px 16px;
  margin-bottom:6px;
  border-radius:10px;
  transition:0.3s;
}

.sidebar a:hover{
  background:rgba(56,189,248,0.1);
  color:white;
  transform:translateX(5px);
}

/* ===== CONTENIDO ===== */
.contenido{
  max-width:1000px;
  margin-left:320px;
  padding:100px 40px 80px;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* 👇 CONTENEDOR QUE CONVIERTE TODO EN "SECTIONS" */
.sections{
  display:flex;
  flex-direction:column;
  gap:35px;
}

/* 👇 ESTILO TIPO TARJETA (como tu imagen) */
.sections > *{
  background:var(--glass);
  padding:40px;
  border-radius:25px;
  border:1px solid var(--glass-border);
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* TITULOS */
h1{
  font-size:60px;
  font-weight:800;
}

.sections h2{
  font-size:24px;
  margin-bottom:10px;
}

/* TEXTO */
.sections p,
.sections ul{
  color:var(--text-muted);
  line-height:1.7;
}

/* LISTAS */
ul{
  padding-left:20px;
}

ul li{
  margin-bottom:8px;
}

/* IMAGEN */
.sections img{
  width:100%;
  max-width:700px;
  display:block;
  margin:20px auto;
  border-radius:16px;
}

/* TABLA */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  border:1px solid var(--glass-border);
  padding:12px;
}

th{
  background:rgba(56,189,248,0.1);
}

/* RESPONSIVE */
@media (max-width:992px){
  .sidebar{
    width:80px;
    min-width:80px;
  }

  .sidebar h2{
    display:none;
  }

  .sidebar a{
    font-size:0;
    text-align:center;
  }

  .sidebar a::before{
    content:"•";
    font-size:2rem;
    color:var(--primary);
  }

  .contenido{
    margin-left:100px;
  }
}
</style>
</head>

<body>

<nav class="sidebar">
  <h2>ÍNDICE</h2>
  <a href="README.html">Inicio</a>
  <a href="contaminacion.html">Contaminación ambiental</a>
  <a href="residuos.html">Residuos informáticos</a>
  <a href="obsolescencia.html">Obsolescencia programada</a>
  <a href="informatica-ecologica.html">Informática ecológica</a>
</nav>

<main class="contenido">
  <div class="sections">
    {{ content }}
  </div>
</main>

</body>
</html>
